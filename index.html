<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Didact — build your own React</title>
  </head>
  <body>
    <div id="layout">
      <section id="app-pane">
        <h2 class="pane-title">App output</h2>
        <div id="root"></div>
      </section>
      <section id="graph-pane">
        <h2 class="pane-title">Fiber graph (live)</h2>
        <div id="fiber-graph"></div>
        <div id="graph-controls">
          <button id="graph-start" title="Jump to start">⏮</button>
          <button id="graph-play" title="Play / pause">▶</button>
          <input
            id="graph-scrubber"
            type="range"
            min="0"
            max="0"
            value="0"
            step="1"
            aria-label="Scrub through render frames"
          />
          <span id="graph-frame" class="frame-label">0 / 0</span>
        </div>
        <p class="legend">
          <span class="swatch active"></span> being worked on
          <span class="swatch done"></span> done
          <span class="line child"></span> child
          <span class="line sibling"></span> sibling
        </p>
      </section>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
