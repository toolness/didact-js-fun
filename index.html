<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>didact-js-fun</title>
  </head>
  <body>
    <div id="layout">
      <section id="app-pane">
        <h2 class="pane-title">App output</h2>
        <div id="root"></div>
      </section>
      <section id="graph-pane">
        <h2 class="pane-title">Fiber graph (live)</h2>
        <div id="fiber-graph"></div>
        <div id="graph-controls">
          <button id="graph-start" title="Jump to start">⏮</button>
          <button id="graph-play" title="Play / pause">▶</button>
          <input
            id="graph-scrubber"
            type="range"
            min="0"
            max="0"
            value="0"
            step="1"
            aria-label="Scrub through render frames"
          />
          <span id="graph-frame" class="frame-label">0 / 0</span>
        </div>
        <div id="graph-config">
          <span class="config-title">Work loop</span>
          <label class="config-field">
            units / chunk
            <input
              id="cfg-chunk-size"
              type="number"
              min="1"
              step="1"
              value="1"
              title="How many units of work the loop runs before yielding to the browser"
            />
          </label>
          <label class="config-field">
            ms / chunk
            <input
              id="cfg-ms-between"
              type="number"
              min="0"
              step="1"
              value="1"
              title="How long the loop waits between chunks (setTimeout delay)"
            />
          </label>
        </div>
        <p class="legend">
          <span class="swatch eff-placement"></span> added
          <span class="swatch eff-update"></span> updated
          <span class="swatch eff-noop"></span> no-op update
          <span class="swatch active"></span> working
          <span class="line child"></span> child
          <span class="line sibling"></span> sibling
        </p>
      </section>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
